name: Daily Riddle Reels Pipeline

on:
  schedule:
    # 04:30 UTC is exactly 10:00 AM IST.
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    
    # We need contents: write permission to push the state tracking files back
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      # Ubuntu runners enforce a strict ImageMagick policy that prevents MoviePy TextClips. We must patch it.
      - name: Patch ImageMagick Policy for MoviePy
        run: |
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml || true
          
      - name: Assemble Credentials
        env:
          GOOGLE_CLIENT_SECRET_BASE64: ${{ secrets.GOOGLE_CLIENT_SECRET_BASE64 }}
          GOOGLE_TOKEN_BASE64: ${{ secrets.GOOGLE_TOKEN_BASE64 }}
        run: |
          python -c "import os, base64; open('client_secret.json', 'wb').write(base64.b64decode(os.environ.get('GOOGLE_CLIENT_SECRET_BASE64', '')))"
          python -c "import os, base64; open('token.json', 'wb').write(base64.b64decode(os.environ.get('GOOGLE_TOKEN_BASE64', '')))"
          
      - name: Run Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python pipeline.py
          
      - name: Commit State Changes
        if: success()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add output/day_counter.txt output/last_schedule_date.txt generators/used_riddles.json || true
          git commit -m "Auto-update state trackers" || true
          git push
